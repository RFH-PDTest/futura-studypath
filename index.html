<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPath - Interactive Mobile Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // "Kwity" palette remap — recolours the whole UI by overriding Tailwind's scales,
        // so existing class names (slate/purple/emerald/amber...) render the new theme.
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Headings & "white" text become deep forest ink
                        white: '#1b3a2d',
                        // Cream "paper & ink" — high numbers = light surfaces, low = dark text
                        slate: {
                            50: '#16201a', 100: '#1d2f27', 200: '#243a30', 300: '#324a3f',
                            400: '#51655a', 500: '#62766b', 600: '#7b8a80', 700: '#d3d6cb',
                            800: '#faf8f2', 900: '#ece8dd', 950: '#f5f2e9'
                        },
                        // Lavender accent
                        purple: {
                            200: '#6a59a8', 300: '#7765bd', 400: '#8472c8', 500: '#a392d6',
                            600: '#8d7ace', 900: '#b6a8df', 950: '#c9bee8'
                        },
                        indigo: { 500: '#9f8fd8', 900: '#b1a2dc' },
                        // Forest green (success / brand)
                        emerald: { 300: '#6f9c87', 400: '#437059', 500: '#3a5d4d', 950: '#2f4a3e' },
                        // Coral (XP, streak, warm accents)
                        amber: { 400: '#c06a6a', 500: '#e29393' },
                        orange: { 400: '#c06a6a', 500: '#e29393' },
                        rose: { 400: '#c06a6a', 500: '#d98a8a' },
                        sky: { 500: '#e29393' }
                    },
                    fontFamily: {
                        display: ['Fraunces', 'Georgia', 'serif']
                    }
                }
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #7d9588 0%, #9fae9f 45%, #e7e3d8 100%); }
        /* Editorial serif for the prominent titles, matching the Kwity look */
        h1, h2 { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.015em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animations (these were referenced in the original but never defined) */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.35s ease-out; }

        @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes toastOut { to { opacity: 0; transform: translate(-50%, 20px); } }

        @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
        .animate-popIn { animation: popIn 0.4s cubic-bezier(.18,.89,.32,1.28); }

        @keyframes xpFloat { 0% { opacity: 0; transform: translateY(0) scale(0.8); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-40px) scale(1.1); } }

        @keyframes confettiFall { to { transform: translateY(120px) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4 text-slate-100">

    <!-- Mobile Device Mockup Container -->
    <div class="relative w-full max-w-[412px] h-[844px] bg-slate-900 rounded-[50px] shadow-2xl border-[12px] border-[#2e4a3d] flex flex-col overflow-hidden">

        <!-- Top Status Bar Mock -->
        <div class="h-10 w-full bg-slate-900 flex justify-between items-center px-8 pt-2 text-xs font-semibold text-slate-400 z-50 shrink-0">
            <div>9:41</div>
            <div class="w-24 h-4 bg-black rounded-full absolute left-1/2 transform -translate-x-1/2 top-2"></div>
            <div class="flex items-center space-x-1">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- App Header (Persistent Stats) -->
        <div class="bg-slate-900 border-b border-slate-800 px-5 py-3 shrink-0 z-40">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-9 h-9 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-500/20">
                        S
                    </div>
                    <div>
                        <h1 class="text-sm font-bold tracking-tight text-white">StudyPath</h1>
                        <p class="text-[10px] text-slate-400 font-medium" id="current-career-badge">Select a Dream Path</p>
                    </div>
                </div>
                <!-- Gamified Stats Header -->
                <div class="flex items-center space-x-3">
                    <div class="bg-slate-800/80 px-2.5 py-1 rounded-full border border-slate-700/50 flex items-center space-x-1 shadow-sm">
                        <span class="text-xs">⚡</span>
                        <span class="text-xs font-bold text-amber-400" id="xp-display">120 XP</span>
                    </div>
                    <div class="bg-slate-800/80 px-2.5 py-1 rounded-full border border-slate-700/50 flex items-center space-x-1 shadow-sm">
                        <span class="text-xs">🔥</span>
                        <span class="text-xs font-bold text-orange-400" id="streak-display">4 Days</span>
                    </div>
                </div>
            </div>
            <!-- Level Progress Bar -->
            <div class="mt-2.5 flex items-center space-x-2">
                <span class="text-[9px] font-bold text-slate-400 shrink-0" id="level-label">LVL 2</span>
                <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                    <div id="level-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-500" style="width: 20%"></div>
                </div>
                <span class="text-[9px] font-medium text-slate-500 shrink-0" id="level-next">to LVL 3</span>
            </div>
        </div>

        <!-- Main Dynamic Screen Content Area -->
        <div id="screen-content" class="flex-1 overflow-y-auto p-5 no-scrollbar pb-24 bg-gradient-to-b from-slate-900 to-slate-950">
            <!-- Dynamic content injected here by JavaScript -->
        </div>

        <!-- Toast / XP float layer -->
        <div id="toast-layer" class="absolute inset-0 pointer-events-none z-[60]"></div>

        <!-- Bottom Navigation Bar -->
        <div class="absolute bottom-0 left-0 right-0 h-20 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 flex justify-around items-center px-4 pb-4 z-50">
            <button onclick="switchTab('career')" id="nav-career" class="flex flex-col items-center space-y-1 transition-all">
                <span class="text-xl">🚀</span>
                <span class="text-[10px]">My Path</span>
            </button>
            <button onclick="switchTab('calendar')" id="nav-calendar" class="flex flex-col items-center space-y-1 transition-all">
                <span class="text-xl">📅</span>
                <span class="text-[10px]">Calendar</span>
            </button>
            <button onclick="switchTab('study')" id="nav-study" class="flex flex-col items-center space-y-1 transition-all">
                <span class="text-xl">🎯</span>
                <span class="text-[10px]">Daily Goals</span>
            </button>
            <button onclick="switchTab('catchup')" id="nav-catchup" class="flex flex-col items-center space-y-1 transition-all relative">
                <span class="text-xl">🩹</span>
                <span class="text-[10px]">AI Catch-Up</span>
                <span id="catchup-ping" class="absolute -top-1 -right-1 w-2 h-2 bg-purple-500 rounded-full animate-ping"></span>
            </button>
        </div>
    </div>

    <!-- JS State Engine & Interactive Mock Logic -->
    <script>
        // Application State
        let state = {
            currentTab: 'career',
            selectedCareer: 'none',
            xp: 120,
            streak: 4,
            // Present school days so far this month (day 10 left absent as an example to toggle)
            claimedDays: [1, 2, 3, 4, 5, 8, 9, 11, 12, 15, 16, 17, 18, 19, 22],
            uploadedNotes: false,
            loadingAI: false,
            quizAnswered: false,
            notesImage: null,        // data URL of the photo the student actually uploaded
            notesFileName: '',
            catchupSubject: '',      // which class the uploaded notes belong to
            completedTasks: [],
            // Timetable feature
            timetable: [],            // [{ id, day, subject, period }]
            timetableDay: 'Mon',      // day currently being edited in the builder
            timetableComplete: false, // true once AI has mapped the schedule
            generatingTimetable: false,
            showCustomInput: false    // "Other" subject input visible in the builder
        };

        // XP needed per level (cumulative thresholds)
        const LEVEL_STEP = 150;

        // Calendar: June 2026 has 30 days and June 1 falls on a Monday (0 leading blanks).
        // "Today" is June 23 — a Tuesday, matching the real current date.
        const CAL_TODAY = 23;
        const CAL_DAYS = 30;

        // Expanded career database — reflects the v2 pivot to widen the path catalog
        // so the gamification loop doesn't break when a student's dream job is missing.
        const careerData = {
            gameDev: {
                title: "Video Game Developer", icon: "🎮", tag: "Coding, Engine Architecture, World-Building", accent: "indigo",
                subjects: [
                    { original: "Algebra & Geometry", reframed: "3D Coordinate Spaces & Physics Vectors", desc: "Essential for coding character movement, collision calculations, and lighting engines.", xp: "25" },
                    { original: "English Literature", reframed: "Interactive Narrative Design & Scripting", desc: "Master dialogue loops, branching choices, and environmental storytelling mechanics.", xp: "20" },
                    { original: "World History", reframed: "Historical World-Building & Lore Mechanics", desc: "Analyze historical structural frameworks to design realistic, immersive level economies.", xp: "20" }
                ]
            },
            bioTech: {
                title: "Bio-Medical Engineer", icon: "🧬", tag: "Prosthetics, AI Diagnosis, Cellular Logic", accent: "emerald",
                subjects: [
                    { original: "Algebra & Geometry", reframed: "Biostatistical Modeling & Fracture Mechanics", desc: "Calculate structural integrity metrics needed for engineering tissue scaffolding and implants.", xp: "25" },
                    { original: "English Literature", reframed: "Technical Synthesis & Clinical Case Drafting", desc: "Learn to articulate complex operational guidelines for medical regulatory approvals clear of error.", xp: "20" },
                    { original: "World History", reframed: "Evolution of Public Health Infrastructure", desc: "Track how historical pandemics directly influenced urbanization laws and engineering design.", xp: "20" }
                ]
            },
            entrepreneur: {
                title: "Digital Marketplace Founder", icon: "💸", tag: "Venture Scale, Product Design, Branding", accent: "amber",
                subjects: [
                    { original: "Algebra & Geometry", reframed: "Algorithmic Pricing & Customer Acquisition LTV", desc: "Model cohort data patterns to accurately compute lifetime asset valuations and pricing scales.", xp: "25" },
                    { original: "English Literature", reframed: "Persuasive Copywriting & Seed Pitch Mechanics", desc: "Master the narrative architectures used to secure capital injections and craft high-conversion funnels.", xp: "20" },
                    { original: "World History", reframed: "Macro Trade Route Disruptions & Monopolies", desc: "Evaluate structural system crashes from the past to target unprotected commercial market gaps.", xp: "20" }
                ]
            },
            lawyer: {
                title: "Trial Lawyer", icon: "⚖️", tag: "Litigation, Policy, Public Argument", accent: "rose",
                subjects: [
                    { original: "Algebra & Geometry", reframed: "Evidentiary Logic & Statistical Proof", desc: "Build airtight chains of reasoning and challenge the probability claims that win or lose a case.", xp: "25" },
                    { original: "English Literature", reframed: "Rhetoric, Cross-Examination & Closing Arguments", desc: "Deconstruct persuasion and subtext to control a courtroom narrative under pressure.", xp: "20" },
                    { original: "World History", reframed: "Constitutional Precedent & Landmark Rulings", desc: "Trace how historical conflicts forged the legal doctrines you'll argue from.", xp: "20" }
                ]
            },
            doctor: {
                title: "Emergency Physician", icon: "🩺", tag: "Diagnostics, Anatomy, Critical Care", accent: "sky",
                subjects: [
                    { original: "Algebra & Geometry", reframed: "Dosage Math & Vital-Sign Modeling", desc: "Compute drug concentrations and read the curves that separate stable from critical patients.", xp: "25" },
                    { original: "English Literature", reframed: "Patient History Intake & Clinical Communication", desc: "Extract the real story from a frightened patient and document it without ambiguity.", xp: "20" },
                    { original: "World History", reframed: "History of Medicine & Disease Eradication", desc: "Understand how breakthroughs and failures shaped modern treatment protocols.", xp: "20" }
                ]
            },
            engineer: {
                title: "Civil Engineer", icon: "🏗️", tag: "Structures, Cities, Sustainable Design", accent: "orange",
                subjects: [
                    { original: "Algebra & Geometry", reframed: "Load-Bearing Calculus & Structural Geometry", desc: "Run the force and stress calculations that keep bridges and towers standing.", xp: "25" },
                    { original: "English Literature", reframed: "Technical Proposals & Safety Documentation", desc: "Write the clear specs and reports that get infrastructure approved and built safely.", xp: "20" },
                    { original: "World History", reframed: "Engineering of Ancient & Modern Cities", desc: "Study how civilizations solved water, transport, and scale to design resilient systems today.", xp: "20" }
                ]
            }
        };

        // Accent color lookup so Tailwind's CDN keeps the classes (avoids dynamic purge issues)
        const accentBg = { indigo: "bg-indigo-500/10", emerald: "bg-emerald-500/10", amber: "bg-amber-500/10", rose: "bg-rose-500/10", sky: "bg-sky-500/10", orange: "bg-orange-500/10" };

        // What each professional ultimately does — used to make AI class connections feel tailored.
        const careerMission = {
            gameDev: "ship games players can't put down",
            bioTech: "engineer devices that keep patients alive",
            entrepreneur: "build a product the market actually pays for",
            lawyer: "win arguments that hold up in court",
            doctor: "make fast, correct calls under pressure",
            engineer: "design structures a whole city can trust"
        };

        // The classes a student can drop into their timetable. Icon + the transferable
        // "angle" each subject trains, which the AI mapper weaves into a career connection.
        const subjectCatalog = {
            "Algebra & Geometry":  { icon: "➗", angle: "quantitative modeling and pattern logic" },
            "English Literature":  { icon: "📖", angle: "narrative, persuasion, and close reading" },
            "World History":       { icon: "🌍", angle: "systems thinking across cause and effect" },
            "Biology":             { icon: "🧫", angle: "living systems and the experimental method" },
            "Chemistry":           { icon: "⚗️", angle: "reactions, ratios, and how materials behave" },
            "Physics":             { icon: "🔭", angle: "forces, energy, and predictive math" },
            "Computer Science":    { icon: "💻", angle: "logic, algorithms, and automation" },
            "Spanish":             { icon: "🗣️", angle: "cross-cultural communication" },
            "Economics":           { icon: "📈", angle: "incentives, markets, and trade-offs" },
            "Art & Design":        { icon: "🎨", angle: "visual composition and rapid iteration" },
            "Physical Education":  { icon: "🏃", angle: "discipline, recovery, and peak performance" }
        };
        const SUBJECT_PALETTE = Object.keys(subjectCatalog);
        const WEEK_DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri"];

        // Icon lookup with a fallback for custom ("Other") subjects not in the catalog.
        function subjectIcon(subject) {
            return (subjectCatalog[subject] && subjectCatalog[subject].icon) || "📘";
        }

        // The "AI" mapper: given a class + chosen major, return how that class feeds the goal.
        // Rich, hand-written reframes win when available; otherwise a tailored template fills in.
        function relateClassToMajor(subject, careerKey) {
            const career = careerData[careerKey];
            const cat = subjectCatalog[subject] || { icon: "📘", angle: "core academic skills" };
            const override = career.subjects.find(s => s.original === subject);
            if (override) {
                return { icon: cat.icon, reframed: override.reframed, desc: override.desc, xp: override.xp };
            }
            return {
                icon: cat.icon,
                reframed: `${subject} → ${career.title} Toolkit`,
                desc: `${subject} builds ${cat.angle} — the exact foundation a ${career.title} leans on to ${careerMission[careerKey]}.`,
                xp: "15"
            };
        }

        // Collapse the timetable into one entry per unique subject, remembering which days it meets.
        function groupTimetableBySubject() {
            const map = {};
            state.timetable.forEach(c => {
                if (!map[c.subject]) map[c.subject] = { subject: c.subject, days: [] };
                if (!map[c.subject].days.includes(c.day)) map[c.subject].days.push(c.day);
            });
            return Object.values(map).map(s => ({
                ...s,
                days: s.days.sort((a, b) => WEEK_DAYS.indexOf(a) - WEEK_DAYS.indexOf(b))
            }));
        }

        // ---------- Feedback helpers (replace native alert popups) ----------
        function showToast(msg, emoji = "✨") {
            const layer = document.getElementById('toast-layer');
            const el = document.createElement('div');
            el.className = "absolute bottom-28 left-1/2 bg-slate-800 border border-slate-600 text-slate-100 text-xs font-semibold px-4 py-2.5 rounded-xl shadow-2xl flex items-center space-x-2";
            el.style.transform = "translateX(-50%)";
            el.style.animation = "toastIn 0.3s ease-out";
            el.innerHTML = `<span class="text-base">${emoji}</span><span>${msg}</span>`;
            layer.appendChild(el);
            setTimeout(() => { el.style.animation = "toastOut 0.3s ease-in forwards"; }, 1800);
            setTimeout(() => el.remove(), 2200);
        }

        function floatXP(amount) {
            const layer = document.getElementById('toast-layer');
            const el = document.createElement('div');
            el.className = "absolute top-24 left-1/2 text-amber-400 font-extrabold text-lg";
            el.style.transform = "translateX(-50%)";
            el.style.animation = "xpFloat 1.1s ease-out forwards";
            el.innerText = `+${amount} XP`;
            layer.appendChild(el);
            setTimeout(() => el.remove(), 1100);
        }

        function confettiBurst() {
            const layer = document.getElementById('toast-layer');
            const colors = ["#a78bfa", "#34d399", "#fbbf24", "#60a5fa", "#f472b6"];
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                const size = 6 + Math.floor(Math.random() * 6);
                p.style.position = "absolute";
                p.style.top = "90px";
                p.style.left = (40 + Math.random() * 320) + "px";
                p.style.width = size + "px";
                p.style.height = size + "px";
                p.style.background = colors[i % colors.length];
                p.style.borderRadius = (Math.random() > 0.5 ? "50%" : "2px");
                p.style.opacity = "1";
                p.style.animation = `confettiFall ${0.8 + Math.random() * 0.6}s ease-in forwards`;
                layer.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }

        // Award XP in one place so level + headers + float animation stay in sync
        function awardXP(amount, { silent = false } = {}) {
            const prevLevel = Math.floor(state.xp / LEVEL_STEP) + 1;
            state.xp += amount;
            const newLevel = Math.floor(state.xp / LEVEL_STEP) + 1;
            if (!silent && amount > 0) floatXP(amount);
            if (newLevel > prevLevel) {
                setTimeout(() => { confettiBurst(); showToast(`Level up! You reached Level ${newLevel}`, "🏆"); }, 300);
            }
        }

        // ---------- Render Routing Engine ----------
        function render() {
            const container = document.getElementById('screen-content');

            // Update Headers
            document.getElementById('xp-display').innerText = `${state.xp} XP`;
            document.getElementById('streak-display').innerText = `${state.streak} Days`;

            // Level bar
            const level = Math.floor(state.xp / LEVEL_STEP) + 1;
            const intoLevel = state.xp % LEVEL_STEP;
            document.getElementById('level-label').innerText = `LVL ${level}`;
            document.getElementById('level-next').innerText = `to LVL ${level + 1}`;
            document.getElementById('level-bar').style.width = `${(intoLevel / LEVEL_STEP) * 100}%`;

            if (state.selectedCareer !== 'none') {
                document.getElementById('current-career-badge').innerText = `Path: ${careerData[state.selectedCareer].title}`;
            } else {
                document.getElementById('current-career-badge').innerText = 'Select a Dream Path';
            }

            // Catch-up ping only matters before notes are processed
            document.getElementById('catchup-ping').style.display = state.uploadedNotes ? 'none' : 'block';

            // Update Active Navigation Highlight
            ['career', 'calendar', 'study', 'catchup'].forEach(tab => {
                const navBtn = document.getElementById(`nav-${tab}`);
                if (tab === state.currentTab) {
                    navBtn.className = "flex flex-col items-center space-y-1 text-purple-400 font-bold scale-105 transition-all";
                } else {
                    navBtn.className = "flex flex-col items-center space-y-1 text-slate-500 hover:text-slate-300 transition-all";
                }
            });

            // Route Screen Layouts
            if (state.currentTab === 'career') renderCareer(container);
            else if (state.currentTab === 'calendar') renderCalendar(container);
            else if (state.currentTab === 'study') renderStudy(container);
            else if (state.currentTab === 'catchup') renderCatchup(container);
        }

        function renderCareer(container) {
            if (state.selectedCareer === 'none') {
                const cards = Object.entries(careerData).map(([key, d]) => `
                    <button onclick="selectCareer('${key}')" class="w-full bg-slate-800 hover:bg-slate-700/80 border border-slate-700 p-4 rounded-2xl flex items-center space-x-4 transition text-left group">
                        <div class="text-3xl ${accentBg[d.accent]} p-3 rounded-xl group-hover:scale-110 transition">${d.icon}</div>
                        <div>
                            <h3 class="font-bold text-sm text-white">${d.title}</h3>
                            <p class="text-xs text-slate-400">${d.tag}</p>
                        </div>
                    </button>
                `).join('');

                container.innerHTML = `
                    <div class="space-y-4 animate-fadeIn">
                        <div class="text-center py-4">
                            <span class="text-4xl">✨</span>
                            <h2 class="text-xl font-extrabold text-white mt-2">What's your dream move?</h2>
                            <p class="text-xs text-slate-400 mt-1">Pick a field. We'll map your current high school classes to its professional requirements.</p>
                        </div>
                        <div class="space-y-3">${cards}</div>
                        <p class="text-[10px] text-slate-600 text-center pt-2">Don't see your dream? More paths are being added every week.</p>
                    </div>
                `;
                return;
            }

            // Career chosen → route through the timetable sub-flow
            if (state.generatingTimetable) { renderTimetableLoading(container); return; }
            if (!state.timetableComplete) { renderTimetableBuilder(container); return; }
            renderCurriculumMap(container);
        }

        // Shared banner for every selected-career sub-screen
        function careerBanner(actionLabel, actionFn) {
            const data = careerData[state.selectedCareer];
            return `
                <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border border-slate-800">
                    <div class="flex items-center space-x-2">
                        <span class="text-xl">${data.icon}</span>
                        <span class="text-xs font-bold text-slate-200">${data.title} Path</span>
                    </div>
                    <button onclick="${actionFn}" class="text-[10px] text-purple-400 hover:underline">${actionLabel}</button>
                </div>
            `;
        }

        // STEP 1 — Build the weekly timetable
        function renderTimetableBuilder(container) {
            const data = careerData[state.selectedCareer];
            const dayClasses = state.timetable.filter(c => c.day === state.timetableDay);
            const total = state.timetable.length;

            const dayPills = WEEK_DAYS.map(d => {
                const count = state.timetable.filter(c => c.day === d).length;
                const active = d === state.timetableDay;
                return `
                    <button onclick="setTimetableDay('${d}')" class="flex-1 py-2 rounded-lg text-[11px] font-bold transition-all ${active ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/20' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}">
                        ${d}${count ? `<span class="block text-[9px] font-medium ${active ? 'text-purple-200' : 'text-slate-500'}">${count} class${count > 1 ? 'es' : ''}</span>` : ''}
                    </button>
                `;
            }).join('');

            const palette = SUBJECT_PALETTE.map(sub => {
                const already = dayClasses.some(c => c.subject === sub);
                return `
                    <button onclick="toggleClass('${sub.replace(/'/g, "\\'")}')" title="${already ? 'Tap to remove' : 'Tap to add'}"

                            <div class="min-w-0">
                                <p class="text-xs font-bold text-white truncate">${state.notesFileName || 'notes image'}</p>
                                <p class="text-[10px] text-emerald-400 font-semibold">Uploaded ✓</p>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold uppercase text-slate-500 tracking-wider">Which class are these notes from?</label>
                            <select onchange="setCatchupSubject(this.value)" class="w-full mt-1.5 bg-slate-800 border border-slate-700 text-white text-xs font-semibold rounded-lg px-3 py-2.5 outline-none focus:border-purple-500">
                                ${subjects.map(s => `<option value="${s}" ${s === chosen ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>

                        <button onclick="processNotes()" class="w-full py-3 rounded-xl font-bold text-sm bg-gradient-to-r from-indigo-500 to-purple-500 text-white shadow-lg shadow-purple-500/20 active:scale-95 transition flex items-center justify-center space-x-2">
                            <span>✨</span><span>Analyze with Claude</span>
                        </button>
                    </div>
                `;
                return;
            }

            // STEP — Upload prompt (default). Real file picker via a hidden input + label.
            container.innerHTML = `
                <div class="space-y-4 animate-fadeIn">
                    <div class="text-center py-4 bg-purple-950/20 border border-purple-500/20 rounded-2xl p-4">
                        <span class="text-3xl">🩹</span>
                        <h2 class="text-sm font-bold text-white mt-2">Missed a Class Session? No Stress.</h2>
                        <p class="text-xs text-slate-400 mt-1">Snap or upload a photo of your (or a classmate's) notes. Claude reads them and builds a recap + quiz.</p>
                    </div>

                    <label for="notes-file" class="border-2 border-dashed border-slate-700 hover:border-purple-500/50 transition bg-slate-800/30 rounded-2xl p-8 flex flex-col items-center justify-center space-y-2 cursor-pointer group">
                        <span class="text-2xl group-hover:scale-110 transition">📸</span>
                        <span class="text-xs font-bold text-slate-300">Snap or Upload Notes File</span>
                        <span class="text-[10px] text-slate-500">Supports PNG, JPEG, HEIC</span>
                    </label>
                    <input id="notes-file" type="file" accept="image/*" class="hidden" onchange="handleNotesFile(this)"/>

                    <button onclick="useSampleNotes()" class="w-full text-center text-[11px] text-purple-400 hover:underline">Don't have a photo handy? Try a sample note →</button>
                </div>
            `;
        }

        // ---------- Interaction Controllers ----------
        function switchTab(tabId) {
            state.currentTab = tabId;
            render();
        }

        function selectCareer(careerKey) {
            state.selectedCareer = careerKey;
            // Picking (or changing) a path always re-opens the timetable map for that major.
            // Existing classes are kept so the same schedule can be re-mapped to a new goal.
            state.timetableComplete = false;
            state.currentTab = 'career';
            if (careerKey !== 'none') {
                showToast(`Path set: ${careerData[careerKey].title}`, careerData[careerKey].icon);
            }
            render();
        }

        // ----- Timetable builder controllers -----
        let classIdCounter = 0;

        function setTimetableDay(day) {
            state.timetableDay = day;
            render();
        }

        function addClass(subject) {
            const day = state.timetableDay;
            if (state.timetable.some(c => c.day === day && c.subject === subject)) return; // no dupes per day
            const period = state.timetable.filter(c => c.day === day).length + 1;
            state.timetable.push({ id: `c${classIdCounter++}`, day, subject, period });
            render();
        }

        // Tap a palette chip to add it, tap again to remove it from the current day.
        function toggleClass(subject) {
            const existing = state.timetable.find(c => c.day === state.timetableDay && c.subject === subject);
            if (existing) removeClass(existing.id);
            else addClass(subject);
        }

        function toggleCustomInput() {
            state.showCustomInput = !state.showCustomInput;
            render();
        }

        function addCustomClass() {
            const inp = document.getElementById('custom-subject-input');
            if (!inp) return;
            const name = inp.value.trim();
            if (!name) return;
            const day = state.timetableDay;
            if (state.timetable.some(c => c.day === day && c.subject.toLowerCase() === name.toLowerCase())) {
                showToast(`"${name}" is already on ${day}`, "⚠️");
                return;
            }
            const period = state.timetable.filter(c => c.day === day).length + 1;
            state.timetable.push({ id: `c${classIdCounter++}`, day, subject: name, period });
            state.showCustomInput = false;
            render();
        }

        function removeClass(id) {
            const removed = state.timetable.find(c => c.id === id);
            state.timetable = state.timetable.filter(c => c.id !== id);
            // Renumber periods for that day so they stay sequential
            if (removed) {
                let p = 1;
                state.timetable.filter(c => c.day === removed.day).forEach(c => { c.period = p++; });
            }
            render();
        }

        function generateTimetable() {
            if (state.timetable.length === 0) return;
            state.generatingTimetable = true;
            render();
            setTimeout(() => {
                state.generatingTimetable = false;
                state.timetableComplete = true;
                awardXP(40);
                showToast("Timetable mapped to your goal! +40 XP", "🗺️");
                render();
            }, 1700);
        }

        function editTimetable() {
            state.timetableComplete = false;
            render();
        }

        function toggleAttendance(day) {
            const isWeekend = ((day - 1) % 7) >= 5;
            if (isWeekend || day > CAL_TODAY) return;   // can't attend weekends or the future
            const present = state.claimedDays.includes(day);
            if (present) {
                state.claimedDays = state.claimedDays.filter(d => d !== day);
                if (day === CAL_TODAY) {                  // today is the live, gamified action
                    awardXP(-30, { silent: true });
                    state.streak = Math.max(0, state.streak - 1);
                    showToast("Attendance removed for today", "↩️");
                } else {
                    showToast(`June ${day} marked absent`, "✕");
                }
            } else {
                state.claimedDays.push(day);
                if (day === CAL_TODAY) {
                    awardXP(30);                          // standard 20 XP × 1.5 multiplier
                    state.streak += 1;
                    showToast(`Attendance confirmed! Streak now ${state.streak} days`, "🔥");
                } else {
                    showToast(`June ${day} marked present`, "✓");
                }
            }
            render();
        }

        // Read the student's actual chosen image and move to the preview step
        function handleNotesFile(input) {
            const file = input.files && input.files[0];
            if (!file) return;
            state.notesFileName = file.name;
            const reader = new FileReader();
            reader.onload = e => { state.notesImage = e.target.result; render(); };
            reader.readAsDataURL(file);
        }

        // Fallback for testing without a real photo on hand
        function useSampleNotes() {
            state.notesImage = SAMPLE_NOTES_IMG;
            state.notesFileName = 'sample-notes.png';
            if (!state.catchupSubject) state.catchupSubject = (state.timetable[0] && state.timetable[0].subject) || 'Algebra & Geometry';
            render();
        }

        function setCatchupSubject(value) {
            state.catchupSubject = value;
        }

        function clearNotesImage() {   // back: preview → upload prompt
            state.notesImage = null;
            state.notesFileName = '';
            render();
        }

        function processNotes() {
            state.loadingAI = true;
            render();
            setTimeout(() => {
                state.loadingAI = false;
                state.uploadedNotes = true;
                render();
            }, 1500);
        }

        function answerQuiz(correct) {
            if (state.quizAnswered) return;
            if (correct) {
                state.quizAnswered = true;
                awardXP(15);
                confettiBurst();
                showToast("Correct! +15 XP added", "🎉");
                render();
            } else {
                showToast("Not quite — try again!", "❌");
            }
        }

        function resetCatchup() {   // back: result → fresh upload prompt
            state.uploadedNotes = false;
            state.quizAnswered = false;
            state.notesImage = null;
            state.notesFileName = '';
            render();
        }

        function toggleTask(id) {
            if (state.completedTasks.includes(id)) {
                state.completedTasks = state.completedTasks.filter(t => t !== id);
                awardXP(-10, { silent: true });
            } else {
                state.completedTasks.push(id);
                awardXP(10);
                showToast("Task complete! +10 XP", "🎯");
            }
            render();
        }

        // Init Layout Execution
        render();
    </script>
</body>
</html>
